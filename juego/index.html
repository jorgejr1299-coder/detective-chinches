<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detective de Chinches</title>
<style>
    body { font-family: 'Comic Sans MS', sans-serif; background-color: #87CEEB; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .panel { background: #fff; max-width: 600px; width: 100%; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); text-align: center; display: none; }
    #menu-screen { display: block; border: 5px solid #32CD32; }
    #trivia-container { border: 5px solid #FFD700; }
    #lab-container { border: 5px solid #9370DB; }
    h1 { color: #FF4500; font-size: 2em; margin-top: 0; }
    .btn { color: white; border: none; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 1.2em; font-weight: bold; width: 100%; margin: 10px 0; transition: transform 0.1s; }
    .btn:hover { transform: scale(1.02); }
    .btn-trivia { background: #1E90FF; }
    .btn-lab { background: #9370DB; }
    .btn-opt { background: #FFD700; color: #333; margin-top: 5px; }
    .btn-correct { background: #32CD32 !important; color: white !important; }
    .btn-incorrect { background: #FF6347 !important; color: white !important; }
    .btn-next { background: #FF8C00; display: none; color: white; }
    .btn-menu { background: #A9A9A9; width: auto; padding: 10px 20px; margin-top: 20px; color: white; }
    .hud { display: flex; justify-content: space-between; background: #FFFACD; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; border: 2px dashed #FF8C00; }
    .emoji-box { font-size: 4em; margin: 10px 0; }
    .feedback { margin-top: 20px; font-size: 1.2em; font-weight: bold; min-height: 30px; }
    
    /* CSS Dibujo de Insectos */
    .bug-stage { display: flex; justify-content: center; gap: 20px; margin: 20px 0; height: 180px; align-items: center; }
    .bug { position: relative; width: 100px; height: 140px; cursor: pointer; transition: transform 0.2s; }
    .bug:hover { transform: scale(1.1); }
    
    /* Chinche Peligroso */
    .triatomino .conexivo { position: absolute; width: 100px; height: 130px; background: repeating-linear-gradient(45deg, #FFD700, #FFD700 10px, #333 10px, #333 20px); border-radius: 40%; top: 10px; left: 0; z-index: 1; border: 2px solid #000; }
    .triatomino .cuerpo { position: absolute; width: 70px; height: 110px; background: #5c4033; border-radius: 40%; top: 20px; left: 15px; z-index: 2; }
    .triatomino .cabeza { position: absolute; width: 20px; height: 35px; background: #333; border-radius: 40% 40% 10% 10%; top: -15px; left: 40px; z-index: 3; }
    .triatomino .trompa { position: absolute; width: 4px; height: 25px; background: #000; top: -35px; left: 48px; z-index: 4; }
    
    /* Insecto Inofensivo */
    .inofensivo .cuerpo { position: absolute; width: 90px; height: 120px; background: #2E8B57; border-radius: 50%; top: 10px; left: 5px; z-index: 2; border: 2px solid #000; }
    .inofensivo .cabeza { position: absolute; width: 30px; height: 20px; background: #222; border-radius: 50%; top: -5px; left: 35px; z-index: 3; }
    .inofensivo .trompa-curva { position: absolute; width: 25px; height: 25px; border-left: 4px solid #000; border-bottom: 4px solid transparent; border-radius: 50%; top: -15px; left: 45px; transform: rotate(45deg); z-index: 4; }
</style>
</head>
<body>

<audio id="audioFondo" src="fondo.wav" loop></audio>
<audio id="audioCorrecto" src="correcto.wav"></audio>
<audio id="audioIncorrecto" src="incorrecto.wav"></audio>

<div id="menu-screen" class="panel">
    <div style="font-size: 5em;">🕵️‍♂️🔍</div>
    <h1>Academia de Guardianes</h1>
    <p style="font-size: 1.2em; font-weight: bold; color: #555;">Elige tu entrenamiento:</p>
    <button class="btn btn-trivia" onclick="startMode('trivia')">📖 Modo Historia: Decisiones</button>
    <button class="btn btn-lab" onclick="startMode('lab')">🔬 Modo Laboratorio: Identificación Visual</button>
</div>

<div id="trivia-container" class="panel">
    <h1 style="color: #1E90FF;">📖 Aventura</h1>
    <div class="hud">
        <div>Nivel: <span id="t-level">1</span>/<span id="t-total">8</span></div>
        <div>Puntos: <span id="t-score">0</span> ⭐️</div>
    </div>
    <div id="t-emoji" class="emoji-box"></div>
    <div id="t-story" style="font-size: 1.2em; font-weight: bold; margin-bottom: 15px;"></div>
    <div id="t-options" style="display: flex; flex-direction: column;"></div>
    <div id="t-feedback" class="feedback"></div>
    <button id="t-next" class="btn btn-next" onclick="nextTrivia()">Siguiente ➡️</button>
    <button class="btn btn-menu" onclick="returnToMenu()">🏠 Volver al Menú</button>
</div>

<div id="lab-container" class="panel">
    <h1 style="color: #9370DB;">🔬 Laboratorio</h1>
    <div class="hud">
        <div>Nivel: <span id="l-level">1</span>/3</div>
        <div>Puntos: <span id="l-score">0</span> ⭐️</div>
    </div>
    <div id="l-story" style="font-size: 1.2em; font-weight: bold; margin-bottom: 10px;"></div>
    <div id="l-stage" class="bug-stage"></div>
    <div id="l-options" style="display: flex; flex-direction: column;"></div>
    <div id="l-feedback" class="feedback"></div>
    <button id="l-next" class="btn btn-next" onclick="nextLab()">Siguiente ➡️</button>
    <button class="btn btn-menu" onclick="returnToMenu()">🏠 Volver al Menú</button>
</div>

<script>
    // DATOS DE JUEGO
    const triviaLevels = [ /* ... tu arreglo de trivia permanece igual ... */
        { emoji: "☀️🏜️", story: "Hace mucho calor y no ha llovido en el monte. ¿Hacia dónde crees que va a caminar para buscar comida?", options: ["A esconderse debajo de una piedra.", "Hacia la casa de tu familia.", "A volar hasta la luna.", "Se queda en el desierto."], answer: 1, reason: "Cuando hay sequía, los chinches se acercan a las casas." },
        { emoji: "🐕🐓", story: "El chinche llegó al patio. ¿A quién crees que va a picar primero?", options: ["Al pez.", "Al perro y las gallinas.", "A una hormiga.", "A una planta."], answer: 1, reason: "A los chinches les gusta la sangre de los perritos y las gallinas." },
        { emoji: "🌧️🏠", story: "¡Empieza a llover! ¿Cuál es su escondite favorito?", options: ["El techo o las grietas.", "El charco de agua.", "Adentro de la nevera.", "En medio del pasto."], answer: 0, reason: "Buscan lugares oscuros y secos como techos y grietas." },
        { emoji: "🎒🏫", story: "Llegas a la escuela y notas escombros y madera amontonada. ¿Qué problema puede causar?", options: ["Árboles más rápidos.", "Escondite para chinches.", "Patio bonito.", "Nidos de pájaros."], answer: 1, reason: "Mantener limpio evita que los chinches hagan nidos." },
        { emoji: "🎨👀", story: "Estás jugando y ves un bicho. ¿Cómo reconoces si es un chinche peligroso?", options: ["Alitas rosa.", "Verde brillante.", "Borde con manchas y trompa recta.", "Mosca gigante."], answer: 2, reason: "Los colores en el borde y su trompa recta nos avisan." },
        { emoji: "🏫🤚", story: "Ves un chinche en la pared del salón. ¿Qué haces?", options: ["Aplastarlo.", "Avisar al profesor para atraparlo en frasco.", "Guardarlo en bolsillo.", "Ignorarlo."], answer: 1, reason: "Nunca los toques con las manos. Los profesores saben cómo guardarlos." },
        { emoji: "🛌🌙", story: "Es de noche. ¿Cuál es un truco para que el chinche no suba a tu cama?", options: ["Comida bajo almohada.", "Separar cama de pared.", "Dormir en suelo.", "Perfume en cobijas."], answer: 1, reason: "Al separar la cama de la pared, el chinche no trepa." },
        { emoji: "🦟💥", story: "Un chinche te picó y dejó popó. ¿Qué haces para NO enfermarte?", options: ["Rascarme fuerte.", "Llorar.", "Lavarme con agua y jabón y avisar.", "Pegarle a la pared."], answer: 2, reason: "El bichito está en el popó. Lavarse impide la infección." }
    ];

    const labLevels = [
        { story: "Observa las trompas. ¿Cuál tiene la trompa RECTA y corta?", bugs: [{ type: 'inofensivo', name: 'Verde' }, { type: 'triatomino', name: 'Chinche' }], answer: 1, reason: "El triatomino tiene la trompa recta." },
        { story: "Mira los bordes. ¿Cuál tiene patrón de manchas?", bugs: [{ type: 'triatomino', name: 'Chinche' }, { type: 'inofensivo', name: 'Escarabajo' }], answer: 0, reason: "Esas rayitas en el borde son señal de alerta." },
        { story: "Basado en todo, selecciona al transmisor.", bugs: [{ type: 'inofensivo', name: 'Planta' }, { type: 'triatomino', name: 'Chagas' }], answer: 1, reason: "¡Has identificado al vector!" }
    ];

    let currentMode = '';
    let currentIdx = 0;
    let score = 0;

    // LÓGICA DE SONIDO
    function reproducirAudio(id) {
        const audio = document.getElementById(id);
        audio.currentTime = 0;
        audio.play().catch(e => console.log("Audio bloqueado hasta el primer clic"));
    }

    function startMode(mode) {
        reproducirAudio('audioFondo');
        document.getElementById('menu-screen').style.display = 'none';
        currentMode = mode;
        currentIdx = 0;
        score = 0;
        if (mode === 'trivia') {
            document.getElementById('trivia-container').style.display = 'block';
            document.getElementById('t-total').innerText = triviaLevels.length;
            loadTrivia();
        } else {
            document.getElementById('lab-container').style.display = 'block';
            loadLab();
        }
    }

    function returnToMenu() {
        document.getElementById('audioFondo').pause(); // Detener música al salir
        document.getElementById('trivia-container').style.display = 'none';
        document.getElementById('lab-container').style.display = 'none';
        document.getElementById('menu-screen').style.display = 'block';
    }

    function checkTrivia(btn, selected, correct, reason) {
        const btns = document.getElementById('t-options').children;
        for (let b of btns) b.disabled = true;

        if (selected === correct) {
            reproducirAudio('audioCorrecto');
            score += 10;
            btn.classList.add('btn-correct');
            document.getElementById('t-feedback').innerHTML = `<span style="color:#228B22">✔️ ${reason}</span>`;
            document.getElementById('t-emoji').innerText = "🎉";
        } else {
            reproducirAudio('audioIncorrecto');
            btn.classList.add('btn-incorrect');
            btns[correct].classList.add('btn-correct');
            document.getElementById('t-feedback').innerHTML = `<span style="color:#FF4500">❌ ${reason}</span>`;
        }
        document.getElementById('t-score').innerText = score;
        document.getElementById('t-next').style.display = 'block';
    }

    function checkLab(selected, correct, reason) {
        const btns = document.getElementById('l-options').children;
        const bugs = document.getElementById('l-stage').children;
        for (let i = 0; i < btns.length; i++) { btns[i].disabled = true; bugs[i].onclick = null; }

        if (selected === correct) {
            reproducirAudio('audioCorrecto');
            score += 10;
            document.getElementById(`lab-btn-${selected}`).classList.add('btn-correct');
            document.getElementById('l-feedback').innerHTML = `<span style="color:#228B22">✔️ ${reason}</span>`;
        } else {
            reproducirAudio('audioIncorrecto');
            document.getElementById(`lab-btn-${selected}`).classList.add('btn-incorrect');
            document.getElementById(`lab-btn-${correct}`).classList.add('btn-correct');
            document.getElementById('l-feedback').innerHTML = `<span style="color:#FF4500">❌ Incorrecto.</span>`;
        }
        document.getElementById('l-score').innerText = score;
        document.getElementById('l-next').style.display = 'block';
    }

    // Funciones de carga y navegación (mantener tal cual estaban)
    function loadTrivia() {
        const lvl = triviaLevels[currentIdx];
        document.getElementById('t-level').innerText = (currentIdx + 1);
        document.getElementById('t-score').innerText = score;
        document.getElementById('t-emoji').innerText = lvl.emoji;
        document.getElementById('t-story').innerText = lvl.story;
        document.getElementById('t-feedback').innerText = '';
        document.getElementById('t-next').style.display = 'none';
        const optDiv = document.getElementById('t-options');
        optDiv.innerHTML = '';
        lvl.options.forEach((opt, idx) => {
            let btn = document.createElement('button');
            btn.className = 'btn btn-opt';
            btn.innerText = opt;
            btn.onclick = () => checkTrivia(btn, idx, lvl.answer, lvl.reason);
            optDiv.appendChild(btn);
        });
    }

    function loadLab() {
        const lvl = labLevels[currentIdx];
        document.getElementById('l-level').innerText = (currentIdx + 1);
        document.getElementById('l-score').innerText = score;
        document.getElementById('l-story').innerText = lvl.story;
        document.getElementById('l-feedback').innerText = '';
        document.getElementById('l-next').style.display = 'none';
        const stage = document.getElementById('l-stage');
        stage.innerHTML = '';
        const optDiv = document.getElementById('l-options');
        optDiv.innerHTML = '';
        lvl.bugs.forEach((bug, idx) => {
            let bugDiv = document.createElement('div');
            bugDiv.className = `bug ${bug.type}`;
            bugDiv.innerHTML = (bug.type === 'triatomino') ? `<div class="conexivo"></div><div class="cuerpo"></div><div class="cabeza"></div><div class="trompa"></div>` : `<div class="cuerpo"></div><div class="cabeza"></div><div class="trompa-curva"></div>`;
            bugDiv.onclick = () => checkLab(idx, lvl.answer, lvl.reason);
            stage.appendChild(bugDiv);
            let btn = document.createElement('button');
            btn.className = 'btn btn-opt';
            btn.id = `lab-btn-${idx}`;
            btn.innerText = `Seleccionar Insecto ${idx + 1}`;
            btn.onclick = () => checkLab(idx, lvl.answer, lvl.reason);
            optDiv.appendChild(btn);
        });
    }

    function nextTrivia() { currentIdx++; if (currentIdx < triviaLevels.length) loadTrivia(); else endTrivia(); }
    function nextLab() { currentIdx++; if (currentIdx < labLevels.length) loadLab(); else endLab(); }
    function endTrivia() { document.getElementById('t-emoji').innerText = "🏆"; document.getElementById('t-story').innerText = `¡Fin de la historia! Puntos: ${score}`; document.getElementById('t-options').innerHTML = ''; document.getElementById('t-next').style.display = 'none'; }
    function endLab() { document.getElementById('l-stage').innerHTML = '<div style="font-size: 5em;">🔬🏆</div>'; document.getElementById('l-story').innerText = `¡Investigación terminada! Puntos: ${score}`; document.getElementById('l-options').innerHTML = ''; document.getElementById('l-next').style.display = 'none'; }
</script>

</body>
</html>
